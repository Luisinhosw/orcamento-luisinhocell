<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuisinhoCell OS</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;margin:0}
header{background:#d40000;padding:15px;text-align:center}
nav{display:flex;gap:10px;flex-wrap:wrap;padding:10px;background:#222}
nav button{padding:10px;border:none;background:#d40000;color:#fff;border-radius:5px}
section{padding:15px}
input,textarea,select{width:100%;padding:8px;margin:5px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.card{background:#222;padding:10px;border-radius:8px}
</style>
</head>
<body>
<header>
<h1>LuisinhoCell - Sistema OS</h1>
</header>

<nav>
<button>Nova OS</button>
<button>Orçamentos</button>
<button>Em Reparo</button>
<button>Prontos</button>
<button>Entregues</button>
</nav>

<section>
<div class="card">
<h2>Cadastro de Ordem de Serviço</h2>
<input placeholder="Nome do Cliente">
<input placeholder="WhatsApp">
<input placeholder="Marca">
<input placeholder="Modelo">
<input placeholder="IMEI">
<input placeholder="Senha">

<h3>Checklist</h3>
<div class="grid">
<label><input type="checkbox"> Liga</label>
<label><input type="checkbox"> Touch</label>
<label><input type="checkbox"> LCD</label>
<label><input type="checkbox"> Wi‑Fi</label>
<label><input type="checkbox"> Bluetooth</label>
<label><input type="checkbox"> Câmera</label>
<label><input type="checkbox"> Microfone</label>
<label><input type="checkbox"> Auricular</label>
<label><input type="checkbox"> Alto-falante</label>
<label><input type="checkbox"> Vibração</label>
<label><input type="checkbox"> Carrega</label>
<label><input type="checkbox"> Biometria</label>
</div>

<textarea placeholder="Defeito informado"></textarea>
<textarea placeholder="Observações"></textarea>

<button onclick="alert('Versão inicial criada!')">Salvar OS</button>
</div>
</section>
</body>
</html>
